<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0d0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Grind Log">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Grind Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
  :root {
    /* Lakers Dark */
    --bg: #0d0814;
    --surface: #160d2a;
    --surface2: #1e1240;
    --border: #32206b;
    --accent: #FDB927;
    --accent-hi: #FDB927;
    --accent2: #c9a84c;
    --text: #f0ecff;
    --muted: #7a6aaa;
    --success: #4ade80;
    --danger: #ff4444;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  [data-theme="light"] {
    --bg: #e2daf0;
    --surface: #eee9f8;
    --surface2: #d8d0ec;
    --border: #bcaed8;
    --accent: #552583;
    --accent-hi: #FDB927;
    --accent2: #8a6a1e;
    --text: #1a0a3b;
    --muted: #6b5c8a;
    --success: #22a855;
    --danger: #d93025;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; }

  /* Install banner */
  #install-banner {
    display: none;
    position: fixed; top: 0; left: 0; right: 0; z-index: 999;
    background: var(--surface2); border-bottom: 1px solid var(--border);
    padding: calc(var(--safe-top) + 10px) 16px 10px;
    text-align: center; font-size: 13px; color: var(--text);
  }
  #install-banner span { color: var(--accent); font-weight: 600; }
  #install-banner button {
    margin-left: 10px; background: none; border: 1px solid var(--border);
    color: var(--muted); border-radius: 6px; padding: 2px 8px; font-size: 12px; cursor: pointer;
  }

  /* Layout */
  #app {
    display: flex; flex-direction: column; height: 100%;
    padding-top: var(--safe-top);
  }

  /* Header */
  header {
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px 10px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 1px; color: var(--accent); }
  header .week-label { font-size: 12px; color: var(--muted); font-weight: 500; }

  /* Tab content */
  #tabs-content { flex: 1; overflow-y: auto; overflow-x: hidden; }
  .tab-panel { display: none; padding: 16px 16px calc(80px + var(--safe-bottom)); }
  .tab-panel.active { display: block; }

  /* Bottom nav */
  nav {
    flex-shrink: 0;
    display: flex; background: var(--surface);
    border-top: 1px solid var(--border);
    padding-bottom: var(--safe-bottom);
  }
  nav button {
    flex: 1; background: none; border: none; color: var(--muted);
    padding: 12px 0 10px; font-size: 11px; font-family: 'DM Sans', sans-serif;
    font-weight: 500; cursor: pointer; display: flex; flex-direction: column;
    align-items: center; gap: 3px; transition: color .15s;
  }
  nav button .nav-icon { font-size: 20px; line-height: 1; }
  nav button.active { color: var(--accent); }

  /* Day strip */
  .day-strip {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 6px; margin-bottom: 20px;
  }
  .day-btn {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 8px 4px 6px;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    cursor: pointer; transition: all .15s; position: relative;
  }
  .day-btn .day-name { font-size: 10px; color: var(--muted); font-weight: 600; text-transform: uppercase; }
  .day-btn .day-num { font-size: 16px; font-weight: 600; color: var(--text); }
  .day-btn .day-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--success); }
  .day-btn .day-label { font-size: 9px; color: var(--muted); text-align: center; line-height: 1.2; max-width: 36px; word-break: break-word; }
  .day-btn.selected { border-color: var(--accent); background: rgba(232,255,71,.06); }
  .day-btn.today .day-num { color: var(--accent); }

  /* Section card */
  .section-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px; margin-bottom: 14px;
  }
  .section-title {
    font-family: 'Bebas Neue', sans-serif; font-size: 18px;
    letter-spacing: .5px; color: var(--text); margin-bottom: 12px;
  }

  /* Activity toggles */
  .activity-toggles { display: flex; gap: 10px; margin-bottom: 18px; }
  .act-toggle {
    flex: 1; padding: 10px; border-radius: 10px;
    background: var(--surface); border: 1.5px solid var(--border);
    color: var(--muted); font-size: 14px; font-weight: 500;
    cursor: pointer; text-align: center; transition: all .15s;
    font-family: 'DM Sans', sans-serif;
  }
  .act-toggle.active { border-color: var(--accent); color: var(--accent); background: rgba(232,255,71,.06); }

  /* Exercise list */
  .exercise-item {
    background: var(--surface2); border-radius: 10px;
    padding: 12px; margin-bottom: 10px;
  }
  .exercise-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px;
  }
  .exercise-name { font-weight: 600; font-size: 14px; }
  .exercise-actions { display: flex; align-items: center; gap: 8px; }
  .pr-badge {
    background: var(--accent-hi); color: #000; font-size: 10px; font-weight: 700;
    padding: 2px 6px; border-radius: 4px; opacity: 0;
    transition: opacity .3s;
  }
  .pr-badge.lit { opacity: 1; }
  .remove-ex-btn {
    background: none; border: none; color: var(--muted); font-size: 16px;
    cursor: pointer; line-height: 1; padding: 2px;
  }
  .sets-list { display: flex; flex-direction: column; gap: 6px; }
  .set-row {
    display: grid; grid-template-columns: 24px 1fr 1fr auto;
    gap: 6px; align-items: center;
  }
  .set-num { font-size: 11px; color: var(--muted); font-weight: 600; text-align: center; }
  .set-input {
    background: var(--bg); border: 1px solid var(--border); border-radius: 7px;
    color: var(--text); font-size: 14px; padding: 6px 8px;
    font-family: 'DM Sans', sans-serif; width: 100%; text-align: center;
  }
  .set-input:focus { outline: none; border-color: var(--accent); }
  .remove-set-btn {
    background: none; border: none; color: var(--muted); font-size: 14px;
    cursor: pointer; padding: 2px 4px;
  }
  .add-set-btn {
    margin-top: 6px; background: none; border: 1px dashed var(--border);
    color: var(--muted); border-radius: 7px; padding: 5px;
    font-size: 12px; width: 100%; cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: all .15s;
  }
  .add-set-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Add exercise */
  .add-exercise-row {
    display: flex; gap: 8px; margin-top: 12px;
  }
  .add-exercise-row input {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 14px; padding: 8px 12px;
    font-family: 'DM Sans', sans-serif;
  }
  .add-exercise-row input:focus { outline: none; border-color: var(--accent); }
  .add-exercise-row button {
    background: var(--accent-hi); color: #000; border: none; border-radius: 8px;
    padding: 8px 14px; font-weight: 600; font-size: 14px; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }

  /* Cardio type selector */
  .cardio-types { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
  .cardio-type-btn {
    padding: 6px 14px; border-radius: 20px;
    background: var(--surface2); border: 1.5px solid var(--border);
    color: var(--muted); font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all .15s; font-family: 'DM Sans', sans-serif;
  }
  .cardio-type-btn.active { border-color: var(--accent2); color: var(--accent2); background: rgba(255,107,53,.06); }

  /* Form fields */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-field { display: flex; flex-direction: column; gap: 5px; }
  .form-field label { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
  .form-field input, .form-field textarea {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 14px; padding: 8px 12px;
    font-family: 'DM Sans', sans-serif; width: 100%;
  }
  .form-field input:focus, .form-field textarea:focus { outline: none; border-color: var(--accent); }
  .form-field textarea { resize: vertical; min-height: 60px; }
  .form-full { grid-column: 1 / -1; }

  /* Save button */
  .save-btn {
    width: 100%; padding: 14px; background: var(--accent-hi); color: #000;
    border: none; border-radius: 12px; font-family: 'Bebas Neue', sans-serif;
    font-size: 20px; letter-spacing: 1px; cursor: pointer; margin-top: 4px;
    transition: opacity .15s;
  }
  .save-btn:active { opacity: .8; }

  /* History */
  .history-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; margin-bottom: 10px; overflow: hidden;
  }
  .history-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px; cursor: pointer;
  }
  .history-date { font-weight: 600; font-size: 14px; }
  .history-tags { display: flex; gap: 6px; margin-top: 3px; }
  .history-tag {
    font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500;
  }
  .tag-lift { background: rgba(232,255,71,.12); color: var(--accent); }
  .tag-cardio { background: rgba(255,107,53,.12); color: var(--accent2); }
  .history-right { display: flex; align-items: center; gap: 10px; }
  .expand-icon { color: var(--muted); font-size: 18px; transition: transform .2s; }
  .history-item.expanded .expand-icon { transform: rotate(180deg); }
  .history-body {
    display: none; padding: 0 14px 14px; border-top: 1px solid var(--border);
    padding-top: 12px;
  }
  .history-item.expanded .history-body { display: block; }

  /* History expanded sections */
  .hist-section { margin-bottom: 14px; }
  .hist-section:last-of-type { margin-bottom: 0; }
  .hist-section-title {
    font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 1px;
    color: var(--muted); margin-bottom: 8px;
    display: flex; align-items: center; gap: 6px;
  }
  .hist-section-title::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }
  .hist-ex { display: flex; align-items: baseline; gap: 10px; margin-bottom: 7px; }
  .hist-ex:last-child { margin-bottom: 0; }
  .hist-ex-name { font-size: 13px; font-weight: 600; color: var(--text); min-width: 110px; flex-shrink: 0; }
  .hist-ex-sets { font-size: 13px; color: var(--muted); }
  .hist-cardio-inline { font-size: 13px; color: var(--text); }
  .hist-notes {
    background: var(--bg); border-radius: 8px; padding: 10px 12px;
    font-size: 13px; color: var(--muted); font-style: italic; line-height: 1.5;
  }
  .hist-footer { display: flex; justify-content: flex-end; margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border); }
  .delete-btn {
    background: none; border: 1px solid var(--danger); color: var(--danger);
    border-radius: 8px; padding: 5px 12px; font-size: 12px; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }

  /* Progress */
  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 10px; }
  .stat-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 10px; text-align: center;
  }
  .stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: var(--accent); line-height: 1; }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 3px; font-weight: 500; }
  .stat-num.fire { color: var(--accent2); }
  .highlights-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .highlight-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px; display: flex; flex-direction: column; gap: 4px;
  }
  .highlight-icon { font-size: 20px; line-height: 1; }
  .highlight-label { font-size: 10px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
  .highlight-value { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.2; }
  .highlight-sub { font-size: 11px; color: var(--muted); }
  .chart-select {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 14px; padding: 10px 12px;
    font-family: 'DM Sans', sans-serif; margin-bottom: 16px; appearance: none;
  }
  .chart-select:focus { outline: none; border-color: var(--accent); }
  canvas { width: 100% !important; border-radius: 10px; }
  .no-data { text-align: center; color: var(--muted); font-size: 14px; padding: 40px 0; }

  /* Toast */
  .toast {
    position: fixed; bottom: calc(70px + var(--safe-bottom) + 10px); left: 50%;
    transform: translateX(-50%) translateY(20px); background: var(--surface2);
    border: 1px solid var(--border); color: var(--text); border-radius: 10px;
    padding: 10px 20px; font-size: 14px; font-weight: 500;
    opacity: 0; transition: all .3s; pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Auth */
  .header-right { display: flex; align-items: center; gap: 10px; }
  .sync-dot {
    width: 7px; height: 7px; border-radius: 50%; background: var(--muted);
    transition: background .3s; flex-shrink: 0;
  }
  .sync-dot.synced { background: var(--success); }
  .sync-dot.syncing { background: var(--accent); animation: pulse .8s infinite alternate; }
  .sync-dot.error { background: var(--danger); }
  @keyframes pulse { from { opacity: 1; } to { opacity: .3; } }
  .auth-btn {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; padding: 5px 10px; font-size: 12px; font-weight: 500;
    cursor: pointer; font-family: 'DM Sans', sans-serif; white-space: nowrap;
    transition: border-color .15s;
  }
  .auth-btn:hover { border-color: var(--accent); }
  .user-avatar {
    width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid var(--border);
    cursor: pointer; object-fit: cover;
  }
  .user-menu {
    position: absolute; top: 56px; right: 16px; z-index: 100;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 8px; min-width: 160px;
    display: none; flex-direction: column; gap: 4px;
  }
  .user-menu.open { display: flex; }
  .user-menu-name { font-size: 12px; color: var(--muted); padding: 4px 8px; }
  .user-menu-btn {
    background: none; border: none; color: var(--danger); text-align: left;
    padding: 7px 8px; border-radius: 6px; font-size: 13px; cursor: pointer;
    font-family: 'DM Sans', sans-serif; font-weight: 500;
  }
  .user-menu-btn:hover { background: rgba(255,68,68,.08); }

  /* Theme toggle */
  .theme-btn {
    background: none; border: 1px solid var(--border); border-radius: 8px;
    color: var(--muted); padding: 5px 8px; font-size: 15px; cursor: pointer;
    line-height: 1; transition: border-color .15s, color .15s;
  }
  .theme-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Strava ──────────────────────────────────────────── */
  .strava-btn {
    background: none; border: 1px solid #FC4C02; color: #FC4C02;
    border-radius: 8px; padding: 5px 10px; font-size: 12px; font-weight: 500;
    cursor: pointer; font-family: 'DM Sans', sans-serif; white-space: nowrap;
    transition: all .15s;
  }
  .strava-btn:hover { background: rgba(252,76,2,.1); }
  .strava-btn.connected { border-color: var(--border); color: var(--muted); }
  .import-strava-btn {
    width: 100%; padding: 10px 14px; background: none;
    border: 1.5px solid #FC4C02; border-radius: 10px;
    color: #FC4C02; font-size: 13px; font-weight: 500;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    margin-bottom: 14px; transition: all .15s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .import-strava-btn:hover { background: rgba(252,76,2,.08); }

  /* ── Load Previous Session ──────────────────────────── */
  .load-prev-btn {
    width: 100%; padding: 10px 14px; background: none;
    border: 1.5px dashed var(--border); border-radius: 10px;
    color: var(--muted); font-size: 13px; font-weight: 500;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    margin-bottom: 14px; transition: all .15s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .load-prev-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Bottom sheet ────────────────────────────────────── */
  .sheet-overlay {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,.5);
  }
  .sheet-overlay.open { display: block; }
  .bottom-sheet {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 201;
    background: var(--surface); border-top: 1px solid var(--border);
    border-radius: 18px 18px 0 0;
    padding-bottom: calc(var(--safe-bottom) + 8px);
    transform: translateY(100%); transition: transform .3s cubic-bezier(.4,0,.2,1);
    max-height: 70vh; display: flex; flex-direction: column;
  }
  .bottom-sheet.open { transform: translateY(0); }
  .sheet-handle {
    width: 36px; height: 4px; background: var(--border); border-radius: 2px;
    margin: 12px auto 0; flex-shrink: 0;
  }
  .sheet-title {
    font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: .5px;
    color: var(--text); padding: 12px 18px 10px; border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .sheet-list { overflow-y: auto; flex: 1; }
  .sheet-row {
    padding: 14px 18px; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background .15s;
  }
  .sheet-row:last-child { border-bottom: none; }
  .sheet-row:active { background: var(--surface2); }
  .sheet-row-date { font-weight: 600; font-size: 14px; color: var(--text); }
  .sheet-row-hint { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .sheet-empty { padding: 32px 18px; text-align: center; color: var(--muted); font-size: 14px; }

  /* ── Responsive desktop layout ─────────────────────── */
  #main-body { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

  @media (min-width: 768px) {
    html, body { overflow: auto; }

    #app {
      flex-direction: column;
      max-width: 1120px;
      margin: 0 auto;
      min-height: 100vh;
      height: auto;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    #main-body { align-items: stretch; }

    /* Content side */
    #tabs-content { flex: 1; overflow-y: auto; }
    .tab-panel { padding: 24px 32px 32px; max-width: 820px; }

    /* Header tweaks */
    header { padding: 16px 24px 14px; }
    header h1 { font-size: 32px; }

    /* Day strip wider */
    .day-strip { gap: 10px; }
    .day-btn { padding: 10px 6px 8px; }

    /* Wider form grid */
    .form-grid { grid-template-columns: 1fr 1fr 1fr; }
    .form-full { grid-column: 1 / -1; }

    /* Stat grid */
    .stat-grid { grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .stat-num { font-size: 42px; }
  }
</style>
</head>
<body>

<div id="install-banner">
  <span>Add to Home Screen</span> — tap Share then "Add to Home Screen" in Safari
  <button onclick="document.getElementById('install-banner').style.display='none'">✕</button>
</div>

<div id="app">
  <header style="position:relative">
    <h1>Grind Log</h1>
    <div class="header-right">
      <span class="week-label" id="week-label"></span>
      <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" title="Toggle theme">☀️</button>
      <button class="strava-btn" id="strava-btn" style="display:none" onclick="stravaConnect()">Connect Strava</button>
      <span class="sync-dot" id="sync-dot" title="Sync status"></span>
      <button class="auth-btn" id="auth-btn" onclick="handleAuthClick()">Sign in</button>
      <img class="user-avatar" id="user-avatar" style="display:none" onclick="toggleUserMenu()" alt="profile">
    </div>
    <div class="user-menu" id="user-menu">
      <span class="user-menu-name" id="user-menu-name"></span>
      <button class="user-menu-btn" onclick="signOut()">Sign out</button>
    </div>
  </header>

  <div id="main-body">
  <div id="tabs-content">
    <!-- LOG TAB -->
    <div class="tab-panel active" id="tab-log">
      <div class="day-strip" id="day-strip"></div>

<script>
// ── Firebase ───────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyBWg4bjwtKfFTpN8wAHaIBUViB1hAYU-IM",
  authDomain: "fitnessapp-8b796.firebaseapp.com",
  projectId: "fitnessapp-8b796",
  storageBucket: "fitnessapp-8b796.firebasestorage.app",
  messagingSenderId: "149539661475",
  appId: "1:149539661475:web:2f0cc43c0c471ff365c116"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();
let currentUser = null;

function setSyncDot(state) {
  const dot = document.getElementById('sync-dot');
  dot.className = 'sync-dot ' + state; // synced | syncing | error | (blank=offline)
}

function sessionsRef() {
  return db.collection('users').doc(currentUser.uid).collection('sessions');
}

async function syncFromFirestore() {
  setSyncDot('syncing');
  try {
    const snap = await sessionsRef().get();
    const remote = snap.docs.map(d => d.data());
    // Merge: union by id, remote wins on conflict
    const map = new Map(sessions.map(s => [s.id, s]));
    remote.forEach(s => map.set(s.id, s));
    sessions = [...map.values()];
    localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions));
    setSyncDot('synced');
    initDayStrip();
    renderHistory();
    updateLoadPrevBtn();
  } catch(e) {
    console.error(e);
    setSyncDot('error');
  }
}

async function writeSessionToFirestore(session) {
  if (!currentUser) return;
  setSyncDot('syncing');
  try {
    await sessionsRef().doc(String(session.id)).set(session);
    setSyncDot('synced');
  } catch(e) {
    console.error(e);
    setSyncDot('error');
  }
}

async function deleteSessionFromFirestore(id) {
  if (!currentUser) return;
  setSyncDot('syncing');
  try {
    await sessionsRef().doc(String(id)).delete();
    setSyncDot('synced');
  } catch(e) {
    console.error(e);
    setSyncDot('error');
  }
}

function handleAuthClick() {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(console.error);

  auth.signOut();
}

}

// Close user menu on outside click
document.addEventListener('click', e => {
  const menu = document.getElementById('user-menu');
  if (!menu.contains(e.target) && e.target.id !== 'user-avatar') {
    menu.classList.remove('open');

auth.onAuthStateChanged(user => {

// ── State ──────────────────────────────────────────────────────────
const STORAGE_KEY = 'grindlog-sessions';
let sessions = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let selectedDayIndex = new Date().getDay(); // 0=Sun…6=Sat, we remap to Mon-based
let selectedActivities = new Set();
let selectedCardioType = 'walk';

const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const CARDIO_TYPES = ['Walk','Run','Hybrid','Cycle','Other'];

const DEFAULT_EXERCISES = [
  { id:'goblet-squat',  name:'Goblet Squats',  sets:[{reps:25,weight:'BW'},{reps:25,weight:'BW'}] },
  { id:'rdl',           name:'RDLs',            sets:[{reps:25,weight:15},{reps:25,weight:15}] },
  { id:'floor-press',   name:'Floor Press',     sets:[{reps:25,weight:15},{reps:25,weight:15}] },
  { id:'rows',          name:'Rows',            sets:[{reps:25,weight:15},{reps:25,weight:15}] },
  { id:'ohp',           name:'Overhead Press',  sets:[{reps:25,weight:15},{reps:25,weight:15}] },
  { id:'pushups',       name:'Push-ups',        sets:[{reps:25,weight:'BW'},{reps:25,weight:'BW'}] },
  { id:'curls',         name:'Curls',           sets:[{reps:25,weight:15},{reps:25,weight:15}] },
  { id:'calf-raises',   name:'Calf Raises',     sets:[{reps:25,weight:'BW'},{reps:25,weight:'BW'}] },
  { id:'plank',         name:'Plank',           sets:[{reps:20,weight:'BW'},{reps:20,weight:'BW'}] },
];

// current exercise list (mutable during session)
let currentExercises = [];

// ── Helpers ────────────────────────────────────────────────────────
function saveSessions(sessionToSync) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions));
  if (sessionToSync) writeSessionToFirestore(sessionToSync);
}

function getWeekNumber(d) {
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  date.setUTCDate(date.getUTCDate() + 4 - (date.getUTCDay() || 7));
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
  return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
}

function getWeekDates() {
  const today = new Date();
  const dow = today.getDay(); // 0=Sun
  // Mon=0 index
  const monday = new Date(today);
  monday.setDate(today.getDate() - ((dow + 6) % 7));
  return Array.from({length:7}, (_, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return d;
  });
}

function dateStr(d) {
  return d.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric', year:'numeric'});
}

function toastMsg(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── PR Detection ───────────────────────────────────────────────────
function getPreviousBest(exId) {
  let best = 0;
  for (const s of sessions) {
    for (const ex of (s.exercises||[])) {
      if (ex.id === exId || ex.name === exId) {
        for (const set of ex.sets) {
          const w = parseFloat(set.weight);
          if (!isNaN(w) && w > best) best = w;
        }
      }
    }
  }
  return best;
}

// ── Week label ─────────────────────────────────────────────────────
function initHeader() {
  const wk = getWeekNumber(new Date());
  document.getElementById('week-label').textContent = `Week ${wk}`;
}

// ── Day strip ──────────────────────────────────────────────────────
function initDayStrip() {
  const strip = document.getElementById('day-strip');
  strip.innerHTML = '';
  const today = new Date();
  const todayMon = (today.getDay() + 6) % 7; // Mon=0
  const weekDates = getWeekDates();

  // selectedDayIndex is Mon-based (0=Mon)
  if (typeof window._selectedMonIdx === 'undefined') {
    window._selectedMonIdx = todayMon;
  }

  weekDates.forEach((d, i) => {
    const btn = document.createElement('div');
    btn.className = 'day-btn' + (i === todayMon ? ' today' : '') + (i === window._selectedMonIdx ? ' selected' : '');

    // Find session for this day
    const ds = dateStr(d);
    const sess = sessions.find(s => s.date === ds);

    const label = sess ? getShortLabel(sess) : '';

    btn.innerHTML = `
      <span class="day-name">${DAYS[i]}</span>
      <span class="day-num">${d.getDate()}</span>
      ${sess ? '<span class="day-dot"></span>' : '<span style="height:5px"></span>'}
      <span class="day-label">${label}</span>
    `;
    btn.addEventListener('click', () => {
      window._selectedMonIdx = i;
      window._selectedDate = dateStr(d);
      initDayStrip();
    });
    strip.appendChild(btn);
  });

  // Set selected date
  if (!window._selectedDate) {
    window._selectedDate = dateStr(weekDates[todayMon]);
  }
}

function getShortLabel(sess) {
  const parts = [];
  if (sess.activities && sess.activities.includes('lift')) parts.push('Lift');
  if (sess.activities && sess.activities.includes('cardio')) parts.push(capitalize(sess.cardioType||'Cardio'));
  return parts.join('/');
}

function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

// ── Activity toggles ───────────────────────────────────────────────
function toggleActivity(type) {
  if (selectedActivities.has(type)) {
    selectedActivities.delete(type);
  } else {
    selectedActivities.add(type);
  }
  document.getElementById('toggle-lift').classList.toggle('active', selectedActivities.has('lift'));
  document.getElementById('toggle-cardio').classList.toggle('active', selectedActivities.has('cardio'));
  document.getElementById('lift-section').style.display = selectedActivities.has('lift') ? 'block' : 'none';
  document.getElementById('cardio-section').style.display = selectedActivities.has('cardio') ? 'block' : 'none';
  stravaUpdateUI();
}

// ── Cardio types ───────────────────────────────────────────────────
function initCardioTypes() {
  const container = document.getElementById('cardio-types');
  container.innerHTML = '';
  CARDIO_TYPES.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'cardio-type-btn' + (t.toLowerCase() === selectedCardioType ? ' active' : '');
    btn.textContent = t;
    btn.onclick = () => {
      selectedCardioType = t.toLowerCase();
      initCardioTypes();
    };
    container.appendChild(btn);
  });
}

// ── Exercise list ──────────────────────────────────────────────────
function initExercises() {
  currentExercises = JSON.parse(JSON.stringify(DEFAULT_EXERCISES));
  renderExercises();
}

function renderExercises() {
  const list = document.getElementById('exercise-list');
  list.innerHTML = '';
  currentExercises.forEach((ex, exIdx) => {
    const prevBest = getPreviousBest(ex.id || ex.name);

    const div = document.createElement('div');
    div.className = 'exercise-item';
    div.id = `ex-${exIdx}`;

    div.innerHTML = `
      <div class="exercise-header">
        <span class="exercise-name">${ex.name}</span>
        <div class="exercise-actions">
          <span class="pr-badge" id="pr-${exIdx}">PR</span>
          <button class="remove-ex-btn" onclick="removeExercise(${exIdx})">✕</button>
        </div>
      </div>
      <div class="sets-list" id="sets-${exIdx}"></div>
      <button class="add-set-btn" onclick="addSet(${exIdx})">+ Add Set</button>
    `;
    list.appendChild(div);
    renderSets(exIdx, prevBest);
  });
}

function renderSets(exIdx, prevBest) {
  const ex = currentExercises[exIdx];
  const container = document.getElementById(`sets-${exIdx}`);
  container.innerHTML = '';

  ex.sets.forEach((set, setIdx) => {
    const row = document.createElement('div');
    row.className = 'set-row';
    row.innerHTML = `
      <span class="set-num">${setIdx+1}</span>
      <input class="set-input" type="text" placeholder="Reps" value="${set.reps}"
        onchange="updateSet(${exIdx},${setIdx},'reps',this.value)">
      <input class="set-input" type="text" placeholder="Wt/BW" value="${set.weight}"
        onchange="updateSet(${exIdx},${setIdx},'weight',this.value)"
        oninput="checkPR(${exIdx})">
      <button class="remove-set-btn" onclick="removeSet(${exIdx},${setIdx})">✕</button>
    `;
    container.appendChild(row);
  });
}

function updateSet(exIdx, setIdx, field, value) {
  currentExercises[exIdx].sets[setIdx][field] = field === 'reps' ? parseInt(value)||0 : value;
  checkPR(exIdx);
}

function checkPR(exIdx) {
  const ex = currentExercises[exIdx];
  const prevBest = getPreviousBest(ex.id || ex.name);
  const currentMax = Math.max(...ex.sets.map(s => parseFloat(s.weight)||0));
  const badge = document.getElementById(`pr-${exIdx}`);
  if (badge) badge.classList.toggle('lit', currentMax > prevBest && prevBest > 0);
}

function addSet(exIdx) {
  const ex = currentExercises[exIdx];
  const last = ex.sets[ex.sets.length-1] || {reps:10,weight:''};
  ex.sets.push({reps: last.reps, weight: last.weight});
  const prevBest = getPreviousBest(ex.id || ex.name);
  renderSets(exIdx, prevBest);
}

function removeSet(exIdx, setIdx) {
  const ex = currentExercises[exIdx];
  if (ex.sets.length <= 1) return;
  ex.sets.splice(setIdx, 1);
  const prevBest = getPreviousBest(ex.id || ex.name);
  renderSets(exIdx, prevBest);
}

function removeExercise(exIdx) {
  currentExercises.splice(exIdx, 1);
  renderExercises();
}

function addCustomExercise() {
  const input = document.getElementById('new-ex-input');
  const name = input.value.trim();
  if (!name) return;
  const id = name.toLowerCase().replace(/\s+/g,'-');
  currentExercises.push({ id, name, sets:[{reps:10,weight:''}] });
  input.value = '';
  renderExercises();
  // Scroll to new exercise
  const list = document.getElementById('exercise-list');
  list.lastElementChild?.scrollIntoView({behavior:'smooth',block:'nearest'});
}

// ── Save session ───────────────────────────────────────────────────
function saveSession() {
  if (selectedActivities.size === 0) {
    toastMsg('Select at least one activity');
    return;
  }

  const date = window._selectedDate || dateStr(new Date());
  const weekDates = getWeekDates();
  const dayIndex = window._selectedMonIdx ?? (new Date().getDay() + 6) % 7;

  // Remove existing session for same date
  sessions = sessions.filter(s => s.date !== date);

  const session = {
    id: Date.now(),
    date,
    dayIndex,
    activities: [...selectedActivities],
    notes: document.getElementById('session-notes').value.trim(),
  };

  if (selectedActivities.has('lift')) {
    session.exercises = currentExercises.map(ex => ({
      id: ex.id,
      name: ex.name,
      sets: ex.sets.map(s => ({reps: s.reps, weight: s.weight}))
    }));
  }

  if (selectedActivities.has('cardio')) {
    session.cardioType = selectedCardioType;
    session.cardioData = {
      type: selectedCardioType,
      duration: document.getElementById('cardio-duration').value.trim(),
      distance: document.getElementById('cardio-distance').value.trim(),
      pace: document.getElementById('cardio-pace').value.trim(),
    };
  }

  sessions.push(session);
  saveSessions(session);

  toastMsg('Session saved!');
  resetForm();
  initDayStrip();
}

function resetForm() {
  selectedActivities.clear();
  document.getElementById('toggle-lift').classList.remove('active');
  document.getElementById('toggle-cardio').classList.remove('active');
  document.getElementById('lift-section').style.display = 'none';
  document.getElementById('cardio-section').style.display = 'none';
  document.getElementById('session-notes').value = '';
  document.getElementById('cardio-duration').value = '';
  document.getElementById('cardio-distance').value = '';
  document.getElementById('cardio-pace').value = '';
  selectedCardioType = 'walk';
  initCardioTypes();
  initExercises();
}

// ── History tab ────────────────────────────────────────────────────
function renderHistory() {
  const list = document.getElementById('history-list');
  const sorted = [...sessions].sort((a,b) => b.id - a.id);

  if (!sorted.length) {
    list.innerHTML = '<div class="no-data">No sessions logged yet.</div>';
    return;
  }

  list.innerHTML = '';
  sorted.forEach(sess => {
    const div = document.createElement('div');
    div.className = 'history-item';

    const tags = (sess.activities||[]).map(a => {
      if (a === 'lift') return '<span class="history-tag tag-lift">🏋️ Lift</span>';
      return `<span class="history-tag tag-cardio">🏃 ${capitalize(sess.cardioType||'Cardio')}</span>`;
    }).join('');

    let bodyHTML = '';

    if (sess.exercises && sess.exercises.length) {
      const rows = sess.exercises.map(ex => `
        <div class="hist-ex">
          <div class="hist-ex-name">${ex.name}</div>
          <div class="hist-ex-sets">${ex.sets.map(s => `${s.weight}×${s.reps}`).join(' · ')}</div>
        </div>`).join('');
      bodyHTML += `
        <div class="hist-section">
          <div class="hist-section-title">🏋️ Lift</div>
          ${rows}
        </div>`;
    }

    if (sess.cardioData) {
      const c = sess.cardioData;
      const parts = [
        capitalize(c.type),
        c.duration || null,
        c.distance || null,
        c.pace     || null,
      ].filter(Boolean);
      bodyHTML += `
        <div class="hist-section">
          <div class="hist-section-title">🏃 Cardio</div>
          <div class="hist-cardio-inline">${parts.join(' · ')}</div>
        </div>`;
    }

    if (sess.notes) {
      bodyHTML += `
        <div class="hist-section">
          <div class="hist-section-title">📝 Notes</div>
          <div class="hist-notes">"${sess.notes}"</div>
        </div>`;
    }

    div.innerHTML = `
      <div class="history-header" onclick="this.parentElement.classList.toggle('expanded')">
        <div>
          <div class="history-date">${sess.date}</div>
          <div class="history-tags">${tags}</div>
        </div>
        <div class="history-right">
          <span class="expand-icon">⌄</span>
        </div>
      </div>
      <div class="history-body">
        ${bodyHTML}
        <div class="hist-footer">
          <button class="delete-btn" onclick="deleteSession(${sess.id})">Delete Session</button>
        </div>
      </div>
    `;
    list.appendChild(div);
  });
}

function deleteSession(id) {
  if (!confirm('Delete this session?')) return;
  sessions = sessions.filter(s => s.id !== id);
  saveSessions();
  deleteSessionFromFirestore(id);
  renderHistory();
  initDayStrip();
  toastMsg('Session deleted');
}

// ── Progress helpers ────────────────────────────────────────────────
function computeStreaks() {
  if (!sessions.length) return { current: 0, best: 0 };
  const DAY = 86400000;
  const timestamps = [...new Set(sessions.map(s => {
    const d = new Date(s.date); d.setHours(0,0,0,0); return d.getTime();
  }))].sort((a,b) => b - a);

  const today = new Date(); today.setHours(0,0,0,0);
  let current = 0;
  if (timestamps[0] >= today.getTime() - DAY) {
    current = 1;
    for (let i = 1; i < timestamps.length; i++) {
      if (timestamps[i-1] - timestamps[i] === DAY) current++;
      else break;
    }
  }
  let best = 1, run = 1;
  for (let i = 1; i < timestamps.length; i++) {
    run = timestamps[i-1] - timestamps[i] === DAY ? run + 1 : 1;
    best = Math.max(best, run);
  }
  return { current, best: Math.max(best, current) };
}

function getThisWeekCount() {
  const weekDates = new Set(getWeekDates().map(d => dateStr(d)));
  return sessions.filter(s => weekDates.has(s.date)).length;
}

function getTopExercise() {
  const counts = new Map();
  sessions.forEach(s => (s.exercises||[]).forEach(ex => {
    counts.set(ex.name, (counts.get(ex.name)||0) + 1);
  }));
  if (!counts.size) return null;
  const [name, n] = [...counts.entries()].sort((a,b) => b[1]-a[1])[0];
  return { name, n };
}

function getTotalSets() {
  return sessions.reduce((sum, s) =>
    sum + (s.exercises||[]).reduce((es, ex) => es + ex.sets.length, 0), 0);
}

function getTopCardio() {
  const counts = new Map();
  sessions.forEach(s => { if (s.cardioType) counts.set(s.cardioType, (counts.get(s.cardioType)||0) + 1); });
  if (!counts.size) return null;
  const [type, n] = [...counts.entries()].sort((a,b) => b[1]-a[1])[0];
  return { type, n };
}

function getAvgPerWeek() {
  if (sessions.length < 2) return sessions.length;
  const timestamps = sessions.map(s => new Date(s.date).getTime());
  const spanDays = (Math.max(...timestamps) - Math.min(...timestamps)) / 86400000 + 1;
  const weeks = Math.max(1, spanDays / 7);
  return (sessions.length / weeks).toFixed(1);
}

function renderHighlights() {
  const topEx   = getTopExercise();
  const topC    = getTopCardio();
  const sets    = getTotalSets();
  const avg     = getAvgPerWeek();

  const cards = [
    {
      icon: '💪', label: 'Top Exercise',
      value: topEx ? topEx.name : '—',
      sub: topEx ? `${topEx.n} session${topEx.n!==1?'s':''}` : 'No lift data yet',
    },
    {
      icon: '📦', label: 'Total Sets Logged',
      value: sets || '—',
      sub: sets ? 'across all sessions' : 'No lift data yet',
    },
    {
      icon: '🏃', label: 'Favourite Cardio',
      value: topC ? capitalize(topC.type) : '—',
      sub: topC ? `${topC.n} session${topC.n!==1?'s':''}` : 'No cardio data yet',
    },
    {
      icon: '📅', label: 'Avg / Week',
      value: avg,
      sub: 'sessions per week',
    },
  ];

  document.getElementById('highlights-grid').innerHTML = cards.map(c => `
    <div class="highlight-box">
      <span class="highlight-icon">${c.icon}</span>
      <span class="highlight-label">${c.label}</span>
      <span class="highlight-value">${c.value}</span>
      <span class="highlight-sub">${c.sub}</span>
    </div>`).join('');
}

// ── Progress tab ───────────────────────────────────────────────────
function renderProgress() {
  const total      = sessions.length;
  const liftCount  = sessions.filter(s => s.activities&&s.activities.includes('lift')).length;
  const cardioCount= sessions.filter(s => s.activities&&s.activities.includes('cardio')).length;
  const { current, best } = computeStreaks();
  const thisWeek   = getThisWeekCount();

  document.getElementById('stat-total').textContent      = total;
  document.getElementById('stat-lift').textContent       = liftCount;
  document.getElementById('stat-cardio').textContent     = cardioCount;
  document.getElementById('stat-streak').textContent     = current;
  document.getElementById('stat-best-streak').textContent= best;
  document.getElementById('stat-this-week').textContent  = thisWeek;

  renderHighlights();

  // Populate exercise dropdown
  const select = document.getElementById('ex-select');
  const allExercises = new Map();
  sessions.forEach(s => {
    (s.exercises||[]).forEach(ex => {
      if (!allExercises.has(ex.id)) allExercises.set(ex.id, ex.name);
    });
  });
  const current2 = select.value;
  select.innerHTML = '<option value="">Select exercise to chart…</option>';
  allExercises.forEach((name, id) => {
    const opt = document.createElement('option');
    opt.value = id; opt.textContent = name;
    if (id === current2) opt.selected = true;
    select.appendChild(opt);
  });

  renderChart();
}

function renderChart() {
  const exId = document.getElementById('ex-select').value;
  const canvas = document.getElementById('progress-chart');
  const noData = document.getElementById('no-data');

  if (!exId) {
    canvas.style.display = 'none';
    noData.style.display = 'none';
    return;
  }

  // Collect data points
  const points = [];
  sessions.forEach(s => {
    (s.exercises||[]).forEach(ex => {
      if (ex.id === exId) {
        const maxW = Math.max(...ex.sets.map(set => parseFloat(set.weight)||0));
        if (maxW > 0) points.push({ date: s.date, id: s.id, weight: maxW });
      }
    });
  });

  points.sort((a,b) => a.id - b.id);

  if (!points.length) {
    canvas.style.display = 'none';
    noData.style.display = 'block';
    return;
  }

  canvas.style.display = 'block';
  noData.style.display = 'none';

  // Draw chart
  const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
  const C = {
    bg:     isDark ? '#160d2a' : '#ffffff',
    grid:   isDark ? '#32206b' : '#e0d8f8',
    muted:  isDark ? '#7a6aaa' : '#7a6a9a',
    accent: isDark ? '#FDB927' : '#552583',
    dot:    isDark ? '#0d0814' : '#f7f4ff',
    gradA:  isDark ? 'rgba(253,185,39,.28)' : 'rgba(85,37,131,.18)',
    gradB:  isDark ? 'rgba(253,185,39,0)'   : 'rgba(85,37,131,0)',
  };

  const dpr = window.devicePixelRatio || 1;
  const W = canvas.parentElement.clientWidth;
  const H = 220;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';

  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const pad = { top:20, right:20, bottom:40, left:44 };
  const plotW = W - pad.left - pad.right;
  const plotH = H - pad.top - pad.bottom;

  const weights = points.map(p => p.weight);
  const minW = Math.min(...weights) * 0.9;
  const maxW = Math.max(...weights) * 1.1;

  const xOf = i => pad.left + (i / (points.length-1||1)) * plotW;
  const yOf = w => pad.top + plotH - ((w - minW) / (maxW - minW || 1)) * plotH;

  // Background
  ctx.fillStyle = C.bg;
  ctx.roundRect(0, 0, W, H, 10);
  ctx.fill();

  // Grid lines
  ctx.strokeStyle = C.grid;
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (plotH / 4) * i;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W-pad.right, y); ctx.stroke();
    const val = maxW - ((maxW - minW) / 4) * i;
    ctx.fillStyle = C.muted;
    ctx.font = '10px DM Sans, sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(Math.round(val), pad.left - 6, y + 4);
  }

  if (points.length === 1) {
    ctx.beginPath();
    ctx.arc(xOf(0), yOf(points[0].weight), 5, 0, Math.PI*2);
    ctx.fillStyle = C.accent;
    ctx.fill();
  } else {
    // Gradient fill
    const grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + plotH);
    grad.addColorStop(0, C.gradA);
    grad.addColorStop(1, C.gradB);

    ctx.beginPath();
    ctx.moveTo(xOf(0), yOf(points[0].weight));
    points.forEach((p,i) => { if(i>0) ctx.lineTo(xOf(i), yOf(p.weight)); });
    ctx.lineTo(xOf(points.length-1), pad.top+plotH);
    ctx.lineTo(xOf(0), pad.top+plotH);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();

    // Line
    ctx.beginPath();
    ctx.moveTo(xOf(0), yOf(points[0].weight));
    points.forEach((p,i) => { if(i>0) ctx.lineTo(xOf(i), yOf(p.weight)); });
    ctx.strokeStyle = C.accent;
    ctx.lineWidth = 2.5;
    ctx.lineJoin = 'round';
    ctx.stroke();

    // Dots
    points.forEach((p,i) => {
      ctx.beginPath();
      ctx.arc(xOf(i), yOf(p.weight), 4, 0, Math.PI*2);
      ctx.fillStyle = C.accent;
      ctx.fill();
      ctx.strokeStyle = C.dot;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    });
  }

  // X-axis labels
  ctx.fillStyle = C.muted;
  ctx.font = '10px DM Sans, sans-serif';
  ctx.textAlign = 'center';
  const step = Math.max(1, Math.floor((points.length-1)/4));
  for (let i = 0; i < points.length; i += step) {
    const parts = points[i].date.split(', ');
    const label = parts[1] || points[i].date;
    ctx.fillText(label, xOf(i), H - pad.bottom + 16);
  }
}

// ── Load Previous Session ──────────────────────────────────────────
function getPastLiftSessions() {
  return [...sessions]
    .filter(s => s.exercises && s.exercises.length > 0)
    .sort((a, b) => b.id - a.id);
}

function updateLoadPrevBtn() {
  const btn = document.getElementById('load-prev-btn');
  if (!btn) return;
  btn.style.display = getPastLiftSessions().length > 0 ? '' : 'none';
}

function formatPickerDate(ds) {
  const d = new Date(ds);
  if (isNaN(d)) return ds;
  const day = d.toLocaleDateString('en-US', { weekday: 'long' });
  const md  = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  return `${day} · ${md}`;
}

function openSessionPicker() {
  document.getElementById('sheet-title').textContent = 'LOAD PREVIOUS SESSION';
  const past = getPastLiftSessions();
  const list = document.getElementById('sheet-list');

  if (!past.length) {
    list.innerHTML = '<div class="sheet-empty">No previous lift sessions found.</div>';
  } else {
    list.innerHTML = past.map(s => {
      const count = s.exercises.length;
      const preview = s.exercises.slice(0, 3).map(e => e.name).join(', ');
      const hint = `${count} exercise${count !== 1 ? 's' : ''} · ${preview}${count > 3 ? '…' : ''}`;
      return `
        <div class="sheet-row" onclick="loadSessionExercises(${s.id})">
          <div class="sheet-row-date">${formatPickerDate(s.date)}</div>
          <div class="sheet-row-hint">${hint}</div>
        </div>`;
    }).join('');
  }

  document.getElementById('sheet-overlay').classList.add('open');
  document.getElementById('session-picker').classList.add('open');
}

function closeSessionPicker() {
  document.getElementById('sheet-overlay').classList.remove('open');
  document.getElementById('session-picker').classList.remove('open');
}

function loadSessionExercises(sessionId) {
  closeSessionPicker();
  const sess = sessions.find(s => s.id === sessionId);
  if (!sess || !sess.exercises) return;

  const doLoad = () => {
    currentExercises = JSON.parse(JSON.stringify(sess.exercises));
    renderExercises();
  };

  if (currentExercises.length > 0) {
    if (confirm('This will replace your current exercises. Continue?')) doLoad();
  } else {
    doLoad();
  }
}

// ── Strava ────────────────────────────────────────────────────────
const STRAVA_CLIENT_ID     = '218060';
const STRAVA_CLIENT_SECRET = 'f40d58d93cd0823f5179adcb18a3763c1de565da';
const STRAVA_REDIRECT_URI  = 'https://fernmed.github.io/grind-log';
const STRAVA_TOKEN_KEY     = 'grindlog-strava';

function stravaGetStored() {
  return JSON.parse(localStorage.getItem(STRAVA_TOKEN_KEY) || 'null');
}

function stravaUpdateUI() {
  const t = stravaGetStored();
  const btn = document.getElementById('strava-btn');
  const importBtn = document.getElementById('import-strava-btn');
  if (!btn) return;
  btn.style.display = '';
  if (t) {
    btn.textContent = '🟠 Strava';
    btn.classList.add('connected');
    btn.onclick = stravaDisconnect;
    if (importBtn) importBtn.style.display = selectedActivities.has('cardio') ? '' : 'none';
  } else {
    btn.textContent = 'Connect Strava';
    btn.classList.remove('connected');
    btn.onclick = stravaConnect;
    if (importBtn) importBtn.style.display = 'none';
  }
}

function stravaConnect() {
  const url = `https://www.strava.com/oauth/authorize?client_id=${STRAVA_CLIENT_ID}&redirect_uri=${encodeURIComponent(STRAVA_REDIRECT_URI)}&response_type=code&scope=activity:read_all`;
  window.location.href = url;
}

function stravaDisconnect() {
  if (!confirm('Disconnect Strava?')) return;
  localStorage.removeItem(STRAVA_TOKEN_KEY);
  stravaUpdateUI();
  toastMsg('Strava disconnected');
}

async function stravaHandleCallback() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  if (!code) return;
  history.replaceState({}, '', window.location.pathname);
  try {
    const res = await fetch('https://www.strava.com/oauth/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        client_id: STRAVA_CLIENT_ID,
        client_secret: STRAVA_CLIENT_SECRET,
        code,
        grant_type: 'authorization_code'
      })
    });
    const data = await res.json();
    if (data.access_token) {
      localStorage.setItem(STRAVA_TOKEN_KEY, JSON.stringify({
        access_token: data.access_token,
        refresh_token: data.refresh_token,
        expires_at: data.expires_at
      }));
      stravaUpdateUI();
      toastMsg('Strava connected!');
    } else {
      toastMsg('Strava auth failed');
    }
  } catch(e) {
    console.error(e);
    toastMsg('Strava auth failed');
  }
}

async function stravaGetToken() {
  let t = stravaGetStored();
  if (!t) return null;
  if (t.expires_at < Date.now() / 1000) {
    try {
      const res = await fetch('https://www.strava.com/oauth/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          client_id: STRAVA_CLIENT_ID,
          client_secret: STRAVA_CLIENT_SECRET,
          grant_type: 'refresh_token',
          refresh_token: t.refresh_token
        })
      });
      const data = await res.json();
      if (data.access_token) {
        t = { ...t, access_token: data.access_token, refresh_token: data.refresh_token, expires_at: data.expires_at };
        localStorage.setItem(STRAVA_TOKEN_KEY, JSON.stringify(t));
      } else {
        localStorage.removeItem(STRAVA_TOKEN_KEY);
        stravaUpdateUI();
        return null;
      }
    } catch(e) { console.error(e); return null; }
  }
  return t.access_token;
}

const STRAVA_TYPE_MAP = {
  Run: 'run', Walk: 'walk', Hike: 'walk',
  Ride: 'cycle', VirtualRide: 'cycle', EBikeRide: 'cycle',
};

function stravaFmtDuration(s) {
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
  return h > 0 ? `${h}h ${m}m` : `${m} min`;
}

function stravaFmtDistance(meters) {
  return `${(meters * 0.000621371).toFixed(2)} mi`;
}

function stravaFmtPace(seconds, meters) {
  if (!meters) return '';
  const secPerMile = seconds / (meters * 0.000621371);
  const m = Math.floor(secPerMile / 60);
  const s = Math.round(secPerMile % 60).toString().padStart(2, '0');
  return `${m}:${s}/mi`;
}

async function stravaImport() {
  const token = await stravaGetToken();
  if (!token) { toastMsg('Connect Strava first'); return; }

  let activities;
  try {
    const res = await fetch('https://www.strava.com/api/v3/athlete/activities?per_page=10', {
      headers: { Authorization: `Bearer ${token}` }
    });
    if (!res.ok) throw new Error();
    activities = await res.json();
  } catch(e) {
    toastMsg('Failed to fetch Strava activities');
    return;
  }

  const relevant = activities.filter(a =>
    ['Run','Walk','Ride','Hike','VirtualRide','EBikeRide','Swim','Workout','Elliptical','StairStepper'].includes(a.type)
  );
  if (!relevant.length) { toastMsg('No recent activities found'); return; }

  window._stravaActivities = relevant;

  const list = document.getElementById('sheet-list');
  list.innerHTML = relevant.map(a => {
    const d = new Date(a.start_date_local);
    const dateLabel = d.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
    const parts = [a.type, stravaFmtDuration(a.elapsed_time), a.distance ? stravaFmtDistance(a.distance) : ''].filter(Boolean);
    return `
      <div class="sheet-row" onclick="stravaLoadActivity(${a.id})">
        <div class="sheet-row-date">${dateLabel} · ${a.name}</div>
        <div class="sheet-row-hint">${parts.join(' · ')}</div>
      </div>`;
  }).join('');

  document.getElementById('sheet-title').textContent = 'IMPORT FROM STRAVA';
  document.getElementById('sheet-overlay').classList.add('open');
  document.getElementById('session-picker').classList.add('open');
}

function stravaLoadActivity(id) {
  closeSessionPicker();
  const a = (window._stravaActivities || []).find(x => x.id === id);
  if (!a) return;

  // Set session date to match the activity date
  const activityDate = new Date(a.start_date_local);
  const ds = dateStr(activityDate);
  window._selectedDate = ds;
  const weekDates = getWeekDates();
  const matchIdx = weekDates.findIndex(d => dateStr(d) === ds);
  if (matchIdx !== -1) window._selectedMonIdx = matchIdx;
  initDayStrip();

  selectedCardioType = STRAVA_TYPE_MAP[a.type] || 'other';
  initCardioTypes();
  document.getElementById('cardio-duration').value = stravaFmtDuration(a.elapsed_time);
  document.getElementById('cardio-distance').value = a.distance ? stravaFmtDistance(a.distance) : '';
  document.getElementById('cardio-pace').value     = a.distance ? stravaFmtPace(a.elapsed_time, a.distance) : '';
  toastMsg('Activity imported!');
}

// ── Tab switching ──────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');

  if (name === 'history') renderHistory();
  if (name === 'progress') renderProgress();
}

// ── Install banner ─────────────────────────────────────────────────
function checkInstallBanner() {
  const isStandalone = window.navigator.standalone === true ||
    window.matchMedia('(display-mode: standalone)').matches;
  const isSafari = /Safari/.test(navigator.userAgent) && !/Chrome/.test(navigator.userAgent);
  if (!isStandalone && isSafari) {
    document.getElementById('install-banner').style.display = 'block';
    // Push content down
    document.getElementById('app').style.paddingTop = 'calc(var(--safe-top) + 44px)';
  }
}

// ── Theme ──────────────────────────────────────────────────────────
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('theme-btn').textContent = theme === 'dark' ? '☀️' : '🌙';
  document.querySelector('meta[name="theme-color"]').setAttribute('content',
    theme === 'dark' ? '#0d0814' : '#f7f4ff');
  localStorage.setItem('grindlog-theme', theme);
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  applyTheme(current === 'dark' ? 'light' : 'dark');
  renderChart();
}

// ── Init ───────────────────────────────────────────────────────────
function init() {
  const savedTheme = localStorage.getItem('grindlog-theme') || 'dark';
  applyTheme(savedTheme);
  initHeader();
  initDayStrip();
  initCardioTypes();
  initExercises();
  updateLoadPrevBtn();
  stravaUpdateUI();
  stravaHandleCallback();
  checkInstallBanner();
}

init();

// SW registration
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(console.error);
}
